tasks.register('installBin') {
    description = 'Create launcher script in $GRAPH_HOME/.bin'
    group = 'development'
    dependsOn 'classes'

    doLast {
        def graphHome = scratchDir.get().asFile
        def binDir = new File(graphHome, ".bin")
        binDir.mkdirs()
        def projectRoot = rootProject.projectDir.absolutePath

        // Dynamic launcher — computes classpath from Gradle each run, never stale
        def script = new File(binDir, "graph")
        script.text = """\
#!/usr/bin/env bash
# Generated by: ./gradlew :ui:installBin
# Common Graph launcher — dynamic classpath (never stale)

SCRIPT_DIR="\$( cd "\$( dirname "\${BASH_SOURCE[0]}" )" && pwd )"
export GRAPH_HOME="\$( cd "\$SCRIPT_DIR/.." && pwd )"
PROJECT_ROOT="${projectRoot}"

# Build first (quiet), then resolve classpath
(cd "\$PROJECT_ROOT" && ./gradlew :ui:classes -q 2>/dev/null)
CLASSPATH="\$(cd "\$PROJECT_ROOT" && ./gradlew -q :ui:printClasspath 2>/dev/null)"

if [ -z "\$CLASSPATH" ]; then
    echo "ERROR: Failed to resolve classpath. Run: ./gradlew :ui:classes" >&2
    exit 1
fi

exec java \\
    -XX:-OmitStackTraceInFastThrow \\
    --enable-native-access=ALL-UNNAMED \\
    -cp "\$CLASSPATH" \\
    dev.everydaythings.graph.Graph \\
    "\$@"
"""
        script.setExecutable(true)

        println ""
        println "=========================================="
        println "  Launcher installed!"
        println "=========================================="
        println ""
        println "  Script: ${script.absolutePath}"
        println "  GRAPH_HOME will be: ${graphHome.absolutePath}"
        println ""
        println "  Usage:"
        println "    ${script.absolutePath}                # default (auto-detect)"
        println "    ${script.absolutePath} --ui=tui       # TUI mode (needs real terminal)"
        println "    ${script.absolutePath} --ui=gui       # GUI mode"
        println "    ${script.absolutePath} --ui=cli       # CLI mode"
        println ""
    }
}

// Helper task: print runtime classpath (used by launcher script)
tasks.register('printClasspath') {
    description = 'Print the runtime classpath (for launcher scripts)'
    group = 'development'
    dependsOn 'classes'

    doLast {
        def cpEntries = sourceSets.main.runtimeClasspath.files.collect { it.absolutePath }
        def classesDir = sourceSets.main.output.classesDirs.asPath
        print(([classesDir] + cpEntries).join(':'))
    }
}
